# Direnv configuration
# Symlink to ~/.config/direnv/direnv.toml

[global]
# Hide the big "direnv: loading/unloading" messages
hide_env_diff = true

# Warn timeout (in milliseconds) - warn if .envrc takes too long
warn_timeout = "5s"

# Strict mode - fail on undefined variables
strict_env = false

[whitelist]
# Auto-allow these directories (careful with this)
# prefix = ["~/Code"]
